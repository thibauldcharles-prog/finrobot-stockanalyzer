[theme]
base = "dark"
primaryColor = "#388bfd"
backgroundColor = "#0d1117"
secondaryBackgroundColor = "#161b22"
textColor = "#e6edf3"
font = "sans serif"

[server]
headless = true
# No hardcoded port: Streamlit Cloud manages the port (8501) and health-checks it.
# Local launchers pass --server.port 8502 on the command line, which overrides this.

[browser]
gatherUsageStats = false
